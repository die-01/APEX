<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message envoyé !</title>
  <!-- CDN Tailwind CSS (si vous n'utilisez pas de build local) -->
  <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

  <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-lg text-center border border-gray-100">
    <!-- Icône de succès verte -->
    <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 text-green-600 mb-6">
      <svg class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
      </svg>
    </div>

    <!-- Message de remerciement -->
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Merci pour votre message !</h1>
    <p class="text-gray-600 mb-6">Votre formulaire a été envoyé avec succès. Nous vous répondrons dans les plus brefs délais.</p>

    <!-- Bouton de retour -->
    <a href="/" class="inline-block bg-gray-900 hover:bg-gray-800 text-white font-medium px-6 py-2.5 rounded-xl transition duration-200">
      Retour à l'accueil
    </a>
  </div>

</body>
</html>
